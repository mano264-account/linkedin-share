<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copy & Post on LinkedIn</title>

<style>
body { font-family: Arial; text-align: center; padding: 20px; }
button { padding: 12px 20px; margin: 10px; font-size: 16px; }
textarea { width: 100%; height: 150px; }
</style>

</head>
<body>

<h2>Preparing your post... 🚀</h2>
<p>If not copied automatically, tap below 👇</p>

<textarea id="postText">
I recently visited the TechForum stall at our office and explored RPA-driven end-to-end automation. It was impressive to see journal entry processing with validations, SAP postings, and automated result sharing with minimal human intervention. Kudos to the team! #Worldline #RPA #Automation #DigitalTransformation #Innovation #SAP #FinanceAutomation
</textarea>

<br>

<button onclick="copyText()">Copy Post</button>
<button onclick="openLinkedIn()">Open LinkedIn & Post</button>

<script>
const text = document.getElementById("postText").value;

// ✅ Auto-copy attempt on load
window.onload = async function() {
  try {
    await navigator.clipboard.writeText(text);
    alert("✅ Post copied! LinkedIn will open next.");
    openLinkedIn(); // auto open after copy
  } catch (err) {
    console.log("Auto-copy blocked");
  }
};

// ✅ Manual fallback copy
function copyText() {
  var copyText = document.getElementById("postText");
  copyText.select();
  document.execCommand("copy");
  alert("✅ Copied! Now opening LinkedIn...");
  openLinkedIn();
}

// ✅ Deep link + fallback to open LinkedIn post composer
function openLinkedIn() {

  // Try opening LinkedIn mobile app (deep link)
  window.location.href = "linkedin://shareArticle";

  // Fallback for browsers / if app is not installed
  setTimeout(function() {
    window.open("https://www.linkedin.com/feed/?shareActive=true", "_blank");
  }, 1200);
}
</script>

</body>
</html>
