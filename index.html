<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Share on LinkedIn</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto;
  background: #f3f6f8;
  padding: 20px;
  margin: 0;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 16px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.1);
  max-width: 450px;
  margin: auto;
}

h2 {
  color: #0A66C2;
  text-align: center;
}

p {
  text-align: center;
  font-size: 14px;
}

textarea {
  width: 100%;
  height: 260px;
  border-radius: 10px;
  padding: 12px;
  font-size: 14px;
  margin-top: 10px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 12px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
}

.copy {
  background: #0A66C2;
  color: white;
}

.open {
  background: #057642;
  color: white;
}

.status {
  margin-top: 12px;
  font-size: 14px;
  text-align: center;
  color: green;
}
</style>

</head>

<body>

<div class="card">

<h2>🚀 Share your Experience</h2>
<p>Your LinkedIn post is getting ready...</p>

<textarea id="postText">
🚀 TechForum Experience – Exploring Intelligent Automation

I recently had the opportunity to visit the TechForum stall at our office premises and gained valuable insights into modern RPA-driven end-to-end automation capabilities.

✅ Key Highlights:

🤖 RPA Bot in Action  
✔️ Fully automated journal entry creation  
✔️ Multiple pre-validations ensuring data accuracy  
✔️ Seamless SAP postings without manual intervention  

⚙️ End-to-End Process Flow  
➡️ Input request received  
➡️ Validation checks executed  
➡️ SAP transaction processed  
➡️ Results extracted automatically  
➡️ Output shared directly to the requester  

🧠 Smart Automation Benefits  
✔️ Minimal to zero human intervention  
✔️ Faster turnaround time  
✔️ Reduced errors and improved accuracy  
✔️ Scalable and reliable workflows  

📊 Impact on Finance Operations  
🔹 Streamlined journal processing  
🔹 Better compliance and accuracy  
🔹 Real-time result delivery  

👏 Kudos to the team for showcasing such impactful solutions and driving innovation forward!

#Worldline #RPA #Automation #DigitalTransformation #Innovation #SAP #FinanceAutomation #AI #FutureOfWork
</textarea>

<button class="copy" onclick="copyText()">✅ Copy Post</button>
<button class="open" onclick="openLinkedIn()">🔗 Open LinkedIn & Post</button>

<div id="status" class="status"></div>

</div>

<script>
const text = document.getElementById("postText").value;
const status = document.getElementById("status");

// ✅ Auto copy
window.onload = async function () {
  try {
    await navigator.clipboard.writeText(text);
    status.innerHTML = "✅ Post copied! Opening LinkedIn...";

    setTimeout(() => {
      openLinkedIn();
    }, 800);

  } catch (e) {
    status.innerHTML = "⚠️ Tap 'Copy Post' if auto-copy fails";
  }
};

// ✅ Manual copy
function copyText() {
  const area = document.getElementById("postText");
  area.select();
  document.execCommand("copy");

  status.innerHTML = "✅ Copied! Opening LinkedIn...";

  setTimeout(() => {
    openLinkedIn();
  }, 500);
}

// ✅ Best possible LinkedIn open logic
function openLinkedIn() {

  // Try opening LinkedIn app
  window.location.href = "linkedin://feed";

  // Fallback to browser composer
  setTimeout(function () {
    window.location.href = "https://www.linkedin.com/sharing/share-offsite/?text=%F0%9F%9A%80%20TechForum%20Experience%20%E2%80%93%20Exploring%20Intelligent%20Automation%0A%0AI%20recently%20had%20the%20opportunity%20to%20visit%20the%20TechForum%20stall%20at%20our%20office%20premises%20and%20gained%20valuable%20insights%20into%20modern%20RPA-driven%20end-to-end%20automation%20capabilities.%0A%0A%E2%9C%85%20Key%20Highlights:%0A%0A%F0%9F%A4%96%20RPA%20Bot%20in%20Action%0A%E2%9C%94%EF%B8%8F%20Fully%20automated%20journal%20entry%20creation%0A%E2%9C%94%EF%B8%8F%20Multiple%20pre-validations%20ensuring%20data%20accuracy%0A%E2%9C%94%EF%B8%8F%20Seamless%20SAP%20postings%20without%20manual%20intervention%0A%0A%E2%9A%99%EF%B8%8F%20End-to-End%20Process%20Flow%0A%E2%9E%A1%EF%B8%8F%20Input%20request%20received%0A%E2%9E%A1%EF%B8%8F%20Validation%20checks%20executed%0A%E2%9E%A1%EF%B8%8F%20SAP%20transaction%20processed%0A%E2%9E%A1%EF%B8%8F%20Results%20extracted%20automatically%0A%E2%9E%A1%EF%B8%8F%20Output%20shared%20directly%20to%20the%20requester%0A%0A%F0%9F%A7%A0%20Smart%20Automation%20Benefits%0A%E2%9C%94%EF%B8%8F%20Minimal%20to%20zero%20human%20intervention%0A%E2%9C%94%EF%B8%8F%20Faster%20turnaround%20time%0A%E2%9C%94%EF%B8%8F%20Reduced%20errors%20and%20improved%20accuracy%0A%E2%9C%94%EF%B8%8F%20Scalable%20workflows%0A%0A%F0%9F%93%8A%20Impact%20on%20Finance%20Operations%0A%F0%9F%94%B9%20Streamlined%20journal%20processing%0A%F0%9F%94%B9%20Better%20compliance%20and%20accuracy%0A%F0%9F%94%B9%20Real-time%20result%20delivery%0A%0A%F0%9F%91%8F%20Kudos%20to%20the%20team%20for%20showcasing%20such%20impactful%20solutions!%0A%0A%23Worldline%20%23RPA%20%23Automation%20%23DigitalTransformation%20%23Innovation%20%23SAP%20%23FinanceAutomation%20%23AI%20%23FutureOfWork";
  }, 1200);
}
</script>

</body>
</html>
